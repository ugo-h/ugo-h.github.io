<script>
const CFG = JSON.parse(document.getElementById('cfg').textContent);
const C = CFG.colors;

// ── Canvas & Scaling ───────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = CFG.W, H = CFG.H;
canvas.width = W; canvas.height = H;

// ── Sprite sheet ───────────────────────────────────────────────────────────
const vampireGlideImg = new Image();
const vampireBackImg = new Image();
vampireGlideImg.src = 'VampireFront.png';
vampireBackImg.src = 'VampireBackAlt.png';
const skeletonWalkImg = new Image();
skeletonWalkImg.src = 'Skeleton_walk.png';
const helmetImg = new Image();
helmetImg.src = 'skate_helmet.png';
const helmetBackImg = new Image();
helmetBackImg.src = 'skate_helmet-back.png';
const glassesImg = new Image();
glassesImg.src = 'skate_glasses.png';
const beerImg = new Image();
beerImg.src = 'beer.png';
const eyeImg = new Image();
eyeImg.src = 'normal_eye.png';
const SKEL_FRAMES   = CFG.enemy.skeleton.frames;
const SKEL_FRAME_W  = CFG.enemy.skeleton.frameW;
const SKEL_FRAME_H  = CFG.enemy.skeleton.frameH;
const SKEL_FPS      = CFG.enemy.skeleton.fps;
const SPRITE_FRAMES = 1;
const SPRITE_SRC_W  = 16;
const SPRITE_SRC_H  = 16;
const SPRITE_STRIDE = 24; // 16px frame + 8px gap between frames

// ── Sound ──────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const audioBufs = {};
(async () => {
  const files = {
    pop:        'sound/SB_POP_SOUND.wav',
    land:       'sound/SB_LAND_SOUND.wav',
    grind:      'sound/GRIND_SOUND.wav',
    getOffRail: 'sound/GET_OFF_RAIL.wav',
    ride:       'sound/RIDING_SOUND.wav',
    turn:       'sound/SB_TURN_SOUND.wav',
    trick:      'sound/KICKFLIP_SOUND.wav',
    special:    'sound/THPS_SPECIAL.oga',
    punch:      'sound/PUNCH_SOUND.wav',
    slam:       'sound/IMPACT_SOUND.wav',
    skeletonDeath:'./sound/skeleton-death-sound.wav',
  };
  await Promise.all(Object.entries(files).map(async ([key, src]) => {
    try {
      const res = await fetch(src);
      audioBufs[key] = await audioCtx.decodeAudioData(await res.arrayBuffer());
    } catch(e) { console.warn('Audio load failed:', src); }
  }));
})();
function playBuf(key, vol = 1) {
  const buf = audioBufs[key];
  if (!buf) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = vol;
  src.connect(g);
  g.connect(audioCtx.destination);
  src.start();
}
const grindLoop = { src: null };
const rideLoop  = { src: null };
function startLoop(loop, key, vol) {
  if (loop.src) return;
  const buf = audioBufs[key];
  if (!buf) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const g = audioCtx.createGain();
  g.gain.value = vol;
  src.connect(g);
  g.connect(audioCtx.destination);
  src.start();
  loop.src = src;
}
function stopLoop(loop) {
  if (!loop.src) return;
  try { loop.src.stop(); } catch(e) {}
  loop.src = null;
}

let touchScaleX = 1, touchScaleY = 1;
function resizeCanvas() {
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  canvas.style.width  = sw + 'px';
  canvas.style.height = sh + 'px';
  touchScaleX = W / sw;
  touchScaleY = H / sh;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── Keyboard (still works on desktop) ────────────────────────────────────
const keys = {}, justPressed = {};
window.addEventListener('keydown', e => {
  if (!paused) audioCtx.resume();
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  if (['Space','KeyK','KeyL','KeyJ','KeyS','KeyA','KeyD'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
function consumeJust(code) { const v = justPressed[code]; justPressed[code] = false; return v; }
function clearJust() { for (const k in justPressed) justPressed[k] = false; }

// ── Touch / Swipe System ───────────────────────────────────────────────────
// Swipe map:
//   Tap (short press)           → Space (ollie / land / start)
//   Swipe Up (mostly vertical)  → Space (ollie)
//   Swipe Up + horizontal       → KeyK  (kickflip)
//   Swipe Left                  → KeyL  (shove-it)
//   Swipe Right                 → KeyJ  (180)
//   Swipe Down                  → Space (land trick) or KeyS (grind) based on state
//
// Grind type: 3 tap buttons rendered at bottom when near a rail
const SWIPE_MIN = 15; // canvas px
const PAUSE_BTN = { w: 44, h: 36 }; // top-right corner hit area

let touchStart = null;

function canvasPt(clientX, clientY) {
  return { x: clientX * touchScaleX, y: clientY * touchScaleY };
}

canvas.addEventListener('touchstart', e => {
  if (!paused) audioCtx.resume();
  e.preventDefault();
  const pt = canvasPt(e.changedTouches[0].clientX, e.changedTouches[0].clientY);

  touchStart = { x: pt.x, y: pt.y, t: Date.now() };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!touchStart) return;
  const pt = canvasPt(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  const dx = pt.x - touchStart.x;
  const dy = pt.y - touchStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const elapsed = Date.now() - touchStart.t;

  // Pause button tap (top-right corner)
  if ((gameState === 'playing' || gameState === 'tutorial') &&
      dist < SWIPE_MIN && elapsed < 300 &&
      touchStart.x >= W - PAUSE_BTN.w && touchStart.y <= PAUSE_BTN.h) {
    togglePause();
    touchStart = null; return;
  }
  if (paused) { touchStart = null; return; }

  // Gameover: require a swipe to proceed, ignore taps
  if (gameState === 'gameover') {
    if (dist >= SWIPE_MIN) gameState = 'title';
    touchStart = null; return;
  }

  if (dist < SWIPE_MIN && elapsed < 300) {
    // Tap → ollie / off rail
    fireKey('Space');
  } else if (dist >= SWIPE_MIN) {
    const absDX = Math.abs(dx), absDY = Math.abs(dy);
    // Classify direction: ratio > 2 = mostly vertical, < 0.5 = mostly horizontal, else diagonal
    const ratio = absDY / (absDX || 0.001);
    const pureVertical   = ratio > 2;
    const pureHorizontal = ratio < 0.5;
    const diagonal       = !pureVertical && !pureHorizontal;

    if (dy < 0) {
      // Upward swipe → kickflip (pure up) or tre-flip (up-right diagonal) if airborne
      const beerKickflip = player && player.powerups.beer && !player.onGround &&
                           (player.trick === TRICK.KICKFLIP || player.trick === TRICK.TREFLIP);
      if (player && !player.onGround && (player.trick === TRICK.NONE || beerKickflip)) {
        if (diagonal && dx > 0) fireKey('KeyI'); // up-right = tre-flip
        else                    fireKey('KeyK'); // up = kickflip
      } else {
        fireKey('Space');
      }
    } else if (dy > 0 && (pureVertical || diagonal)) {
      // Downward swipe (pure or diagonal)
      if (player && !player.onGround) {
        // Set grind intent from diagonal direction
        if (diagonal && dx < 0) player.grindIntent = '5-0';
        else if (diagonal && dx > 0) player.grindIntent = 'NOSE GRIND';
        else player.grindIntent = '50-50'; // pure down
        // Unified action: land trick, bail, or grind
        if (player.trickDone && player.trickLandWindow) {
          fireKey('Space'); // land trick cleanly
        } else if (player.trick !== TRICK.NONE && !player.trickDone) {
          fireKey('Space'); // bail — Space mid-trick triggers fail
        } else {
          fireKey('KeyS');  // no trick → attempt grind with chosen intent
        }
      }
    } else if (pureHorizontal) {
      const beerShoveIt = player && player.powerups.beer && !player.onGround && player.trick === TRICK.SHOVEIT;
      if (dx < 0 && (player && !player.onGround && (player.trick === TRICK.NONE || beerShoveIt)))
        fireKey('KeyL'); // swipe left = shove-it
      else if (dx > 0) fireKey('KeyJ'); // swipe right = 180
    }
  }
  touchStart = null;
}, { passive: false });

canvas.addEventListener('touchcancel', e => { touchStart = null; }, { passive: false });

function fireKey(code) {
  justPressed[code] = true;
  keys[code] = true;
  setTimeout(() => { keys[code] = false; }, 80);
}

// ── Math utils ─────────────────────────────────────────────────────────────
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const rand  = (a, b) => a + Math.random() * (b - a);

// ── Constants ──────────────────────────────────────────────────────────────
const GROUND_Y   = CFG.GROUND_Y;
const S  = CFG.scale;           // ← master scale multiplier
const SZ = CFG.sizes;           // raw size params (before scale)
const HUD = CFG.hud;            // HUD font sizes (before scale)
const PX  = CFG.parallax;       // parallax params

// Game object sizes — all multiplied by S
const PW             = SZ.playerW       * S;
const PH             = SZ.playerH       * S;
const HEAD_W         = SZ.headW         * S;
const HEAD_H         = SZ.headH         * S;
const BW             = SZ.boardW        * S;
const BH             = SZ.boardH        * S;
const BOARD_OFFSET_Y = SZ.boardOffsetY  * S;
const WHEEL_R        = SZ.wheelR        * S;
const GRIND_BOARD_TILT   = 0.45;
const GRIND_PLAYER_SHIFT = SZ.grindShift * S;
const TRICK = { NONE: 0, KICKFLIP: 1, SHOVEIT: 2, T180: 3, TREFLIP: 4 };

// Helper: scaled HUD font string
const hf  = (key) => `${Math.round(HUD[key] * S)}px monospace`;
const hfb = (key) => `bold ${Math.round(HUD[key] * S)}px monospace`;

const TRICK_NAMES = {
  singles: {
    1: { name: 'KICKFLIP',  pts: 120 },
    2: { name: 'SHOVE-IT',  pts: 80  },
    3: { name: '180',       pts: 100, fakieName: 'HALF CAB' },
    4: { name: 'TRE FLIP',  pts: 350 },
  },
  combos: {
    '3,3':   { name: '360',                 pts: 250, fakieName: 'FULL CAB'               },
    '3,2':   { name: 'BIGSPIN',             pts: 220                                      },
    '2,3':   { name: 'BIGSPIN',             pts: 220                                      },
    '1,3':   { name: '180 KICKFLIP',        pts: 280, fakieName: 'HALF CAB KICKFLIP'      },
    '3,1':   { name: '180 LATE KICKFLIP',   pts: 300, fakieName: 'HALF CAB LATE KICKFLIP' },
    '1,1':   { name: 'DOUBLE KICKFLIP',     pts: 800                                      },
    '2,2':   { name: '360 SHOVE-IT',        pts: 1000                                     },
    '1,1,1': { name: 'TRIPLE KICKFLIP',     pts: 1350                                      },
    '1,3,3': { name: '360 KICKFLIP',        pts: 600, fakieName: 'FULL CAB KICKFLIP'      },
    '3,1,3': { name: '360 KICKFLIP',        pts: 600, fakieName: 'FULL CAB KICKFLIP'      },
    '3,3,3': { name: '540',                 pts: 400                                      },
    '1,3,1': { name: '180 DOUBLE KICKFLIP', pts: 600, fakieName: 'HALF CAB DOUBLE KICKFLIP'},
    '1,3,1,3':{ name: '360 DOUBLE KICKFLIP',pts: 700, fakieName: 'FULL CAB DOUBLE KICKFLIP'},
  },
};

// ── Player factory ─────────────────────────────────────────────────────────
function makePlayer() {
  return {
    x: 120, y: GROUND_Y - PH,
    vx: CFG.MOVE_SPEED, vy: 0,
    onGround: true,
    olliePhase: 0, ollieTimer: 0,
    trick: TRICK.NONE, trickAngle: 0, trickTarget: 0,
    trickSpeed: 0, trickDone: false, trickAxis: 'z',
    trickLandWindow: false, trickFailed: false, boardDetached: false,
    trickBatch: [], fakieAtJump: false,
    bodyScaleX: 1, fakie: false,
    boardNoseAngle: 0, boardTailAngle: 0,
    jumpBuffer: 0,
    coyoteTimer: 0,
    alive: true, dying: false, deathTimer: 0, deathDuration: 0.7,
    flashTimer: 0,
    boardLostX: 0, boardLostY: 0, boardDistance: 0, popOffsetX: 0,
    invincibleTimer: 0,
    grindIntent: '50-50', grindType: '50-50',
    grindBoardAngle: 0, grindPlayerShift: 0, rampAngle: 0, activeRamp: null,
    grinding: false, grindRail: null, grindSparkTimer: 0,
    grindTime: 0, preGrindBatch: [], hadGrind: false,
    trick180Cooldown: 0,
    squishTimer: 0,
    animTimer: 0, animFrame: 0,

  };
}

// ── World state ────────────────────────────────────────────────────────────
let camX = 0, score = 0, lives = 3, livesFromScore = 0;
let bestCombo = { name: '', pts: 0 };
let acquiredPowerups = [];
let gameState = 'title';
let paused = false, pauseTip = 0;
function togglePause() {
  paused = !paused;
  if (paused) {
    pauseTip = Math.floor(Math.random() * PAUSE_TIPS.length);
    audioCtx.suspend();
  } else {
    audioCtx.resume();
  }
}
const PAUSE_TIPS = [
  'Chain tricks in the air for huge combo multipliers — land cleanly to cash out!',
  'Grinding rails resets your trick combo and stacks extra points on top.',
  'Nosebonk vampires mid-air to earn a score multiplier and a big upward boost.',
  'Going fakie (riding backwards) makes tricks faster and scores style points.',
  'Rack up LINE score by chaining jumps — fill the bar to earn an extra life!',
];
let flashTimer = 0, flashColor = C.flash;
let lineMeeter = 0;
let lineMeeterPersist = 0;
let screenMsg = '', screenMsgTimer = 0, screenMsgColor = C.text;
let screenMsg2 = '', screenMsgTimer2 = 0, screenMsgColor2 = C.green;
let particles = [], deathPieces = [];
let player, obstacles;
let pitRespawnX = null;  // set when player falls in pit, used on next respawn

// ── Tutorial state ─────────────────────────────────────────────────────────
let titleSkipTutorial = localStorage.getItem('skipTutorial') === 'true';
let tutStep = 0;          // 0=ollie, 1=kickflip, 2=grind, 3=done
let tutComplete = false;
let tutCompleteTimer = 0;
let tutKickflipReady = false;
let tutKickflipRideTimer = 0; // ride time after landing kickflip before teleport
let tutTeleportTimer = 0;     // counts down, fades to black before teleporting
let tutTeleportFadeIn = 0;   // counts down, fades from black after teleporting
let tutNextStep = -1;         // if >= 0, advance to this stage on teleport
let sceneTransitionTimer = 0; // fade-in after scene switch
const TUT_STAGE_X = [120, 450, 800]; // respawn X for each stage

// ── Obstacles ──────────────────────────────────────────────────────────────
const CHUNK_W             = 900;   // world-width of each generated chunk
const CHUNK_AHEAD         = 3;     // chunks to keep ahead of player
const CHUNK_BEHIND        = 1;     // chunks to keep behind before pruning
const MIN_GAP_BOX         = 220;   // min run-up gap before a box
const MIN_GAP_RAIL        = 320;   // min run-up gap before a rail
const MIN_GAP_AFTER_RAIL  = 120;   // min clear space after rail end

let worldFrontier = 0;  // rightmost generated x

function makeObstacle(x) {
  const h = (rand(SZ.obstacleMinH, SZ.obstacleMaxH) * S) | 0;
  return { x, y: GROUND_Y - h + 18, w: SZ.obstacleW * S, h, cleared: false, hit: false };
}
function makeRail(x, deadly = false) {
  const w = (rand(SZ.railMinW, SZ.railMaxW) * S) | 0;
  return { x, y: GROUND_Y - SZ.railY * S, w, h: SZ.railH * S, type: deadly ? 'rail-deadly' : 'rail', cleared: false, hit: false };
}


function makeRamp(pitX, pitW) {
  const rh = SZ.rampH * S;
  const rw = Math.max(60 * S, pitW * 0.45);
  const angle = Math.atan2(rh, rw);
  // Right edge flush with pit left edge — no gap
  return { x: pitX - rw, y: GROUND_Y - rh, w: rw, h: rh,
           angle, type: 'ramp', cleared: false, hit: false };
}

function makePit(x) {
  const w = (rand(SZ.pitMinW, SZ.pitMaxW) * S) | 0;
  const pit = { x, y: GROUND_Y, w, h: SZ.pitDepth * S, type: 'pit', cleared: false, hit: false };
  pit.ramp = w >= SZ.pitRampThreshold * S ? makeRamp(x, w) : null;
  return pit;
}
function makeEnemy(x) {
  const ew = CFG.enemy.w * S, eh = CFG.enemy.h * S;
  return {
    x, y: GROUND_Y - eh,
    w: ew, h: eh,
    patrolX: x + ew / 2, patrolRange: CFG.enemy.patrolRange * S,
    vx: CFG.enemy.speed,
    type: 'enemy',
    alive: true, dying: false, deathTimer: 0, deathDuration: CFG.enemy.deathDuration,
    cleared: false, hit: false,
    walkPhase: 0, animFrame: 0, animTimer: 0,
  };
}

function generateChunk(chunkX, difficulty) {
  const result = [];
  let x = chunkX + rand(180, 280);
  const chunkEnd = chunkX + CHUNK_W;

  // Weights at difficulty=0 → difficulty=1 (normalized automatically)
  //                  base   + scale * difficulty
  const WEIGHTS = [
    { type: 'rail',  base: 0.30, scale:  0.20 },
    { type: 'pair',  base: 0.15, scale:  0.25 },
    { type: 'pit',   base: 0.25, scale:  0.10 },
    { type: 'enemy', base: 0.10, scale:  0.10 },
    { type: 'box',   base: 0.12, scale: -0.20 },
  ];

  function pickType() {
    let total = 0;
    const table = WEIGHTS.map(w => ({ type: w.type, w: Math.max(0, w.base + w.scale * difficulty) }));
    for (const e of table) total += e.w;
    let roll = Math.random() * total;
    for (const e of table) { roll -= e.w; if (roll <= 0) return e.type; }
    return 'box';
  }

  while (x < chunkEnd - 120) {
    switch (pickType()) {
      case 'rail': {
        x += rand(MIN_GAP_RAIL, MIN_GAP_RAIL + 120 * (1 - difficulty));
        if (x >= chunkEnd - 80) return result;
        const rail = makeRail(x, Math.random() < difficulty);
        result.push(rail);
        x = rail.x + rail.w + rand(MIN_GAP_AFTER_RAIL, MIN_GAP_AFTER_RAIL + 160);
        break;
      }
      case 'pair': {
        x += rand(MIN_GAP_BOX, MIN_GAP_BOX + 100 * (1 - difficulty));
        if (x >= chunkEnd - 80) return result;
        result.push(makeObstacle(x));
        x += rand(80, 140);
        if (x < chunkEnd - 60) result.push(makeObstacle(x));
        x += rand(MIN_GAP_BOX, MIN_GAP_BOX + 80);
        break;
      }
      case 'pit': {
        x += rand(280, 400);
        if (x >= chunkEnd - 80) return result;
        const pit = makePit(x);
        if (pit.ramp) result.push(pit.ramp);
        result.push(pit);
        x = pit.x + pit.w + rand(200, 320);
        break;
      }
      case 'enemy': {
        x += rand(MIN_GAP_BOX, MIN_GAP_BOX + 150 * (1 - difficulty));
        if (x >= chunkEnd - 40) return result;
        result.push(makeEnemy(x));
        x += rand(MIN_GAP_BOX, MIN_GAP_BOX + 80);
        break;
      }
      case 'box': {
        x += rand(MIN_GAP_BOX, MIN_GAP_BOX + 150 * (1 - difficulty));
        if (x >= chunkEnd - 40) return result;
        result.push(makeObstacle(x));
        break;
      }
    }
  }
  return result;
}

function extendObstacles() {
  const targetFrontier = camX + W + CHUNK_AHEAD * CHUNK_W;
  while (worldFrontier < targetFrontier) {
    const difficulty = Math.min(1, worldFrontier / 25000);
    obstacles.push(...generateChunk(worldFrontier, difficulty));
    worldFrontier += CHUNK_W;
  }
  // Prune far-behind obstacles
  const pruneX = camX - CHUNK_BEHIND * CHUNK_W;
  if (obstacles.length > 60) {
    let i = 0;
    while (i < obstacles.length && obstacles[i].x + (obstacles[i].w || 0) < pruneX) i++;
    if (i > 0) obstacles.splice(0, i);
  }
}

// ── Particles ──────────────────────────────────────────────────────────────
function spawnParticles(x, y, n, color) {

    particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp-100, life: li, maxLife: li, color, r: rand(SZ.particleMinSize, SZ.particleMaxSize) });
  }
}
function spawnEnemyBurst(x, y, w, h) {
  const cx = x + w/2, cy = y + h/2;
  // Chunky red body pieces — fast, big
  for (let i = 0; i < 30; i++) {
    const a = rand(0, Math.PI*2), sp = rand(150, 500), li = rand(0.5, 1.1);
    particles.push({ x: cx+rand(-w/3,w/3), y: cy+rand(-h/3,h/3),
      vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - rand(60,200),

    const a = rand(0, Math.PI*2), sp = rand(80, 320), li = rand(0.4, 0.9);

}
function updateParticles(dt) {
  for (const p of particles) { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=600*dt; p.life-=dt; }
  particles = particles.filter(p => p.life > 0);
}

// ── Death pieces ──────────────────────────────────────────────────────────
